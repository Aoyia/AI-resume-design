name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js Static Export
        run: |
          mv src/app/api src/api_backup
          npm run build
        env:
          EXPORT_STATIC: 'true'
          NEXT_PUBLIC_PAGE_PASSWORD: ${{ secrets.PAGE_PASSWORD || 'resume2026' }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
